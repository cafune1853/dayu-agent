[pytest]
# pytest 配置文件

# 测试目录
testpaths = tests

# Python 文件匹配模式
python_files = test_*.py

# Python 类匹配模式
python_classes = Test*

# Python 函数匹配模式
python_functions = test_*

# 添加自定义标记
markers =
    unit: 单元测试（快速，完全Mock）
    integration: 集成测试（较慢，部分Mock）
    e2e: 端到端测试（很慢，需要真实API，默认跳过）
    asyncio: 异步测试（使用 pytest-asyncio）
    slow: 慢速测试

# 输出选项
addopts =
    -v
    --strict-markers
    --tb=short
    
# 覆盖率配置（使用 pytest-cov）
# 推荐运行: pytest tests/ -r a --cov=dayu/agent --cov-report=html:workspace/output/htmlcov --cov-report=term --cov-branch
# 输出位置: workspace/output/htmlcov/index.html
# 
# 快捷命令：
# - 完整报告（engine + fins）: pytest tests/ -r a --cov=dayu/agent --cov-report=html:workspace/output/htmlcov --cov-report=term --cov-branch
# - 仅 engine: pytest tests/engine -r a --cov=dayu/agent/engine --cov-report=html:workspace/output/htmlcov --cov-report=term --cov-branch
# - 仅 fins: pytest tests/fins -r a --cov=dayu/agent/fins --cov-report=html:workspace/output/htmlcov --cov-report=term --cov-branch

# 最小覆盖率要求（使用 --cov-fail-under）
# 运行: pytest --cov=dayu/agent --cov-fail-under=80

# 测试发现忽略
norecursedirs = .git .tox dist build *.egg __pycache__ output Reports

# 日志配置
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 三方库告警过滤
# 说明：
# - 当前 edgartools 在包导入阶段会触发旧 html 模块弃用告警。
# - 这些告警来自三方库内部导入链，非本仓库直接调用导致。
# - 仅过滤已确认的 3 类告警，避免掩盖其它潜在问题。
filterwarnings =
    ignore:edgar\.files\.html_documents module \(including HtmlDocument\) is deprecated and will be removed in v6\.0.*:DeprecationWarning
    ignore:edgar\.files\.html module is deprecated and will be removed in v6\.0.*:DeprecationWarning
    ignore:edgar\.files\.htmltools module \(including ChunkedDocument\) is deprecated and will be removed in v6\.0.*:DeprecationWarning
