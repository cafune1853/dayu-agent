prompt_name: fill_overview
version: v1
inputs:
  - name: chapter
    type: scalar
    required: true
    description: 当前章节标题
  - name: company
    type: scalar
    required: true
    description: 公司名称
  - name: ticker
    type: scalar
    required: true
    description: 股票代码
  - name: company_facets_summary
    type: markdown_block
    required: true
    description: 公司业务类型与关键约束摘要
  - name: report_goal
    type: scalar
    required: true
    description: 全文总目标
  - name: audience_profile
    type: scalar
    required: true
    description: 全局读者画像
  - name: chapter_goal
    type: scalar
    required: true
    description: 本章回答的总目标
  - name: overview_source_of_truth
    type: scalar
    required: true
    description: 第0章输入来源边界
  - name: overview_allow_new_facts
    type: scalar
    required: true
    description: 第0章是否允许新增事实
  - name: overview_allow_new_sources
    type: scalar
    required: true
    description: 第0章是否允许新增来源
  - name: skeleton
    type: markdown_block
    required: true
    description: 去除 HTML 注释后的章节骨架
  - name: chapter_contract
    type: json_block
    required: true
    description: 本章合同 JSON 对象
  - name: prior_chapters_summary_input
    type: markdown_block
    required: true
    description: 传入的前文章节结构化输入
